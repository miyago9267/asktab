<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="hljs.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="row">
      <select id="provider" title="Provider"></select>
      <select id="model" title="Model"></select>
      <input id="model-custom" hidden placeholder="model id" spellcheck="false" />
      <select id="speed" title="Speed / reasoning effort"></select>
    </div>
    <div class="row">
      <select id="tab" title="Target tab"></select>
      <button id="clear" title="Clear conversation">清除</button>
    </div>
    <div id="status" class="status"></div>
  </header>

  <main id="messages"></main>

  <footer>
    <textarea id="input" rows="2" placeholder="分析、摘要，或任何想問這個分頁的事…"></textarea>
    <button id="send">送出</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
